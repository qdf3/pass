<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🔐 لعبة كلمة السر</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #2a3a55;
    --accent1: #6c63ff;
    --accent2: #00d4ff;
    --accent3: #ff6584;
    --gold: #ffd700;
    --text: #e8edf5;
    --muted: #7a8ba0;
    --correct: #00e676;
    --wrong-place: #ffab40;
    --incorrect: #546e7a;
    --glow1: rgba(108,99,255,0.35);
    --glow2: rgba(0,212,255,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem;
    overflow-x: hidden;
  }

  /* animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(108,99,255,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(0,212,255,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 560px; }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .logo-icon {
    font-size: 3.5rem;
    line-height: 1;
    margin-bottom: .4rem;
    filter: drop-shadow(0 0 18px var(--accent1));
  }
  header h1 {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }
  header p {
    font-size: .9rem;
    color: var(--muted);
    margin-top: .4rem;
    line-height: 1.6;
  }

  /* STATS BAR */
  .stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: .75rem;
    margin-bottom: 1.5rem;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: .75rem .5rem;
    text-align: center;
    transition: border-color .3s;
  }
  .stat-box:hover { border-color: var(--accent1); }
  .stat-label { font-size: .7rem; color: var(--muted); margin-bottom: .2rem; letter-spacing: .5px; }
  .stat-value { font-size: 1.6rem; font-weight: 900; color: var(--text); }
  .stat-value.danger { color: var(--accent3); text-shadow: 0 0 12px rgba(255,101,132,.5); }
  .stat-value.accent { color: var(--accent2); text-shadow: 0 0 12px var(--glow2); }

  /* INPUT AREA */
  .input-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .digit-inputs {
    display: flex;
    justify-content: center;
    gap: .75rem;
    margin-bottom: 1.25rem;
  }
  .digit-inputs input {
    width: 62px;
    height: 72px;
    text-align: center;
    font-size: 2rem;
    font-weight: 900;
    font-family: 'Cairo', sans-serif;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    outline: none;
    transition: border-color .25s, box-shadow .25s, transform .15s;
    caret-color: var(--accent2);
  }
  .digit-inputs input:focus {
    border-color: var(--accent1);
    box-shadow: 0 0 0 4px var(--glow1), 0 0 20px var(--glow1);
    transform: translateY(-3px) scale(1.05);
  }
  .digit-inputs input.filled {
    border-color: var(--accent2);
    box-shadow: 0 0 10px var(--glow2);
  }

  .btn-row {
    display: flex;
    gap: .75rem;
  }
  .btn {
    flex: 1;
    padding: .85rem 1rem;
    border: none;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s, opacity .2s;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent1), #4e46e5);
    color: #fff;
    box-shadow: 0 4px 20px var(--glow1);
  }
  .btn-primary:hover { box-shadow: 0 6px 28px rgba(108,99,255,.6); }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--muted);
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

  /* LEGEND */
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.25rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: .45rem;
    font-size: .8rem;
    color: var(--muted);
  }
  .dot {
    width: 20px; height: 20px;
    border-radius: 6px;
    font-size: .65rem;
    font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    color: #000;
  }
  .dot-b { background: var(--correct); }
  .dot-m { background: var(--wrong-place); }
  .dot-x { background: var(--incorrect); }

  /* HISTORY */
  .history-section { width: 100%; }
  .history-title {
    font-size: .8rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: .75rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .history-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .attempt-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: .85rem 1.1rem;
    margin-bottom: .6rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeSlide .35s ease both;
    transition: border-color .3s;
  }
  .attempt-row:hover { border-color: var(--border); }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .attempt-num {
    font-size: .75rem;
    color: var(--muted);
    min-width: 26px;
    font-weight: 700;
  }
  .attempt-digits {
    display: flex;
    gap: .45rem;
    flex: 1;
    justify-content: center;
  }
  .digit-badge {
    width: 42px; height: 46px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    font-weight: 900;
    color: #000;
    position: relative;
    transition: transform .2s;
  }
  .digit-badge:hover { transform: scale(1.1); }
  .badge-b { background: var(--correct); box-shadow: 0 0 10px rgba(0,230,118,.4); }
  .badge-m { background: var(--wrong-place); box-shadow: 0 0 10px rgba(255,171,64,.4); }
  .badge-x { background: var(--incorrect); color: #ccc; }

  .attempt-clue {
    display: flex;
    gap: .35rem;
    min-width: 80px;
    justify-content: flex-end;
    align-items: center;
  }
  .clue-pill {
    font-size: .75rem;
    font-weight: 700;
    padding: .25rem .55rem;
    border-radius: 20px;
    letter-spacing: .5px;
  }
  .clue-b { background: rgba(0,230,118,.15); color: var(--correct); border: 1px solid rgba(0,230,118,.3); }
  .clue-m { background: rgba(255,171,64,.15); color: var(--wrong-place); border: 1px solid rgba(255,171,64,.3); }

  /* MESSAGE OVERLAY */
  .message-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
  }
  .message-overlay.show { display: flex; }
  .message-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 340px;
    width: 90%;
    animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
    box-shadow: 0 0 60px rgba(108,99,255,.3);
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.7); }
    to { opacity: 1; transform: scale(1); }
  }
  .message-emoji { font-size: 4rem; margin-bottom: .75rem; }
  .message-title { font-size: 1.6rem; font-weight: 900; margin-bottom: .5rem; }
  .message-sub { font-size: .9rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.7; }
  .message-secret { font-size: 2.5rem; font-weight: 900; letter-spacing: .5rem; color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,.5); margin-bottom: 1.5rem; }

  /* no-history placeholder */
  .empty-history {
    text-align: center;
    color: var(--muted);
    font-size: .85rem;
    padding: 1.5rem;
    border: 1px dashed var(--border);
    border-radius: 14px;
  }

  /* shake animation */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .shake { animation: shake .4s ease; }

  /* confetti */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 200;
    animation: confettiFall 1.8s ease-in both;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(-80px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg); }
  }

  /* GitHub Badge */
  .github-badge {
    margin-top: 2rem;
    text-align: center;
  }
  .github-badge a {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .55rem 1.1rem;
    color: var(--muted);
    font-size: .8rem;
    text-decoration: none;
    transition: border-color .2s, color .2s;
  }
  .github-badge a:hover { border-color: var(--accent2); color: var(--accent2); }

  /* responsive */
  @media(max-width:420px){
    .digit-inputs input { width:52px; height:60px; font-size:1.6rem; }
    .digit-badge { width:36px; height:40px; font-size:1.1rem; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-icon">🔐</div>
    <h1>لعبة كلمة السر</h1>
    <p>خمّن الرقم السري المكوّن من 4 أرقام مختلفة<br/>لديك 10 محاولات — هل ستنجح؟</p>
  </header>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">المحاولات</div>
      <div class="stat-value accent" id="attempts-count">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">المتبقي</div>
      <div class="stat-value" id="remaining-count">10</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">الانتصارات</div>
      <div class="stat-value" id="wins-count">0</div>
    </div>
  </div>

  <div class="input-section">
    <div class="digit-inputs" id="digit-inputs">
      <input type="number" min="0" max="9" maxlength="1" class="digit-input" data-idx="0" placeholder="؟" />
      <input type="number" min="0" max="9" maxlength="1" class="digit-input" data-idx="1" placeholder="؟" />
      <input type="number" min="0" max="9" maxlength="1" class="digit-input" data-idx="2" placeholder="؟" />
      <input type="number" min="0" max="9" maxlength="1" class="digit-input" data-idx="3" placeholder="؟" />
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="check-btn" disabled>✓ تحقق</button>
      <button class="btn btn-secondary" id="new-btn">↺ جديدة</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="dot dot-b">B</div>صحيح في مكانه</div>
    <div class="legend-item"><div class="dot dot-m">M</div>صحيح في مكان خاطئ</div>
    <div class="legend-item"><div class="dot dot-x">✕</div>غير موجود</div>
  </div>

  <div class="history-section">
    <div class="history-title">📋 المحاولات السابقة</div>
    <div id="history-list">
      <div class="empty-history">لم تبدأ أي محاولة بعد...<br/>أدخل أرقامك وابدأ اللعب! 🎮</div>
    </div>
  </div>

  <div class="github-badge">
    <a href="https://github.com" target="_blank">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.1.82-.26.82-.57v-2c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.74-1.33-1.74-1.09-.74.08-.72.08-.72 1.2.08 1.83 1.23 1.83 1.23 1.07 1.83 2.8 1.3 3.48 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.65.24 2.87.12 3.17.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.68.83.56C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
      عرض المشروع على GitHub
    </a>
  </div>

</div>

<!-- WIN/LOSE OVERLAY -->
<div class="message-overlay" id="overlay">
  <div class="message-card">
    <div class="message-emoji" id="msg-emoji">🎉</div>
    <div class="message-title" id="msg-title">مبروك!</div>
    <div class="message-secret" id="msg-secret"></div>
    <div class="message-sub" id="msg-sub"></div>
    <button class="btn btn-primary" onclick="newGame()">↺ لعبة جديدة</button>
  </div>
</div>

<script>
const MAX_TRIES = 10;
const CODE_LEN = 4;

let secret = [], attempts = 0, wins = 0, gameOver = false;

function generateSecret() {
  const d = [];
  while (d.length < CODE_LEN) {
    const n = Math.floor(Math.random() * 10);
    if (!d.includes(n)) d.push(n);
  }
  return d;
}

function newGame() {
  secret = generateSecret();
  attempts = 0;
  gameOver = false;
  updateStats();
  document.getElementById('history-list').innerHTML = '<div class="empty-history">لم تبدأ أي محاولة بعد...<br/>أدخل أرقامك وابدأ اللعب! 🎮</div>';
  document.getElementById('overlay').classList.remove('show');
  clearInputs();
  document.querySelectorAll('.digit-input')[0].focus();
}

function clearInputs() {
  document.querySelectorAll('.digit-input').forEach(i => {
    i.value = '';
    i.classList.remove('filled');
  });
  document.getElementById('check-btn').disabled = true;
}

function updateStats() {
  document.getElementById('attempts-count').textContent = attempts;
  const rem = MAX_TRIES - attempts;
  const remEl = document.getElementById('remaining-count');
  remEl.textContent = rem;
  remEl.className = 'stat-value' + (rem <= 3 ? ' danger' : '');
  document.getElementById('wins-count').textContent = wins;
}

function getGuess() {
  return [...document.querySelectorAll('.digit-input')].map(i => parseInt(i.value));
}

function evaluate(guess) {
  let b = 0, m = 0;
  for (let i = 0; i < CODE_LEN; i++) {
    if (guess[i] === secret[i]) b++;
    else if (secret.includes(guess[i])) m++;
  }
  return { b, m };
}

function checkGuess() {
  if (gameOver) return;
  const guess = getGuess();
  if (guess.some(isNaN)) {
    shakeInputs(); return;
  }
  const unique = new Set(guess);
  if (unique.size < CODE_LEN) {
    shakeInputs(); return;
  }
  attempts++;
  const { b, m } = evaluate(guess);
  addToHistory(guess, b, m, attempts);
  updateStats();
  clearInputs();

  if (b === CODE_LEN) {
    wins++;
    updateStats();
    setTimeout(() => showMessage('win', attempts), 400);
    launchConfetti();
    gameOver = true;
  } else if (attempts >= MAX_TRIES) {
    setTimeout(() => showMessage('lose'), 400);
    gameOver = true;
  } else {
    document.querySelectorAll('.digit-input')[0].focus();
  }
}

function addToHistory(guess, b, m, num) {
  const list = document.getElementById('history-list');
  const placeholder = list.querySelector('.empty-history');
  if (placeholder) placeholder.remove();

  const colorOf = (digit, idx) => {
    if (digit === secret[idx]) return 'badge-b';
    if (secret.includes(digit)) return 'badge-m';
    return 'badge-x';
  };

  const badges = guess.map((d, i) =>
    `<div class="digit-badge ${colorOf(d, i)}">${d}</div>`
  ).join('');

  const clues = `
    ${b > 0 ? `<span class="clue-pill clue-b">${b}B</span>` : ''}
    ${m > 0 ? `<span class="clue-pill clue-m">${m}M</span>` : ''}
    ${b === 0 && m === 0 ? `<span style="font-size:.75rem;color:var(--muted)">✕</span>` : ''}
  `;

  const row = document.createElement('div');
  row.className = 'attempt-row';
  row.innerHTML = `
    <span class="attempt-num">#${num}</span>
    <div class="attempt-digits">${badges}</div>
    <div class="attempt-clue">${clues}</div>
  `;
  list.insertBefore(row, list.firstChild);
}

function showMessage(type, triesUsed) {
  const overlay = document.getElementById('overlay');
  if (type === 'win') {
    document.getElementById('msg-emoji').textContent = '🏆';
    document.getElementById('msg-title').textContent = 'أحسنت!';
    document.getElementById('msg-title').style.color = 'var(--gold)';
    document.getElementById('msg-secret').textContent = secret.join(' ');
    document.getElementById('msg-sub').innerHTML =
      `نجحت في ${triesUsed} ${triesUsed === 1 ? 'محاولة' : 'محاولات'}<br/>أنت محترف حقيقي! 🌟`;
  } else {
    document.getElementById('msg-emoji').textContent = '💔';
    document.getElementById('msg-title').textContent = 'انتهت المحاولات';
    document.getElementById('msg-title').style.color = 'var(--accent3)';
    document.getElementById('msg-secret').textContent = secret.join(' ');
    document.getElementById('msg-sub').innerHTML = `الرقم السري كان:<br/>حظ أفضل في المرة القادمة! 💪`;
  }
  overlay.classList.add('show');
}

function shakeInputs() {
  const cont = document.getElementById('digit-inputs');
  cont.classList.remove('shake');
  void cont.offsetWidth;
  cont.classList.add('shake');
}

function launchConfetti() {
  const colors = ['#6c63ff','#00d4ff','#ff6584','#ffd700','#00e676','#ffab40'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 1.2 + 's';
    c.style.width = (6 + Math.random() * 10) + 'px';
    c.style.height = (6 + Math.random() * 10) + 'px';
    c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

// Input handling
document.querySelectorAll('.digit-input').forEach((inp, idx, all) => {
  inp.addEventListener('input', () => {
    let v = inp.value.replace(/[^0-9]/g,'');
    if (v.length > 1) v = v.slice(-1);
    inp.value = v;
    inp.classList.toggle('filled', v !== '');
    if (v && idx < CODE_LEN - 1) all[idx + 1].focus();
    const filled = [...all].filter(i => i.value !== '').length;
    document.getElementById('check-btn').disabled = filled < CODE_LEN;
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && inp.value === '' && idx > 0) {
      all[idx - 1].focus();
      all[idx - 1].value = '';
      all[idx - 1].classList.remove('filled');
    }
    if (e.key === 'Enter') {
      const filled = [...all].filter(i => i.value !== '').length;
      if (filled === CODE_LEN) checkGuess();
    }
  });
});

document.getElementById('check-btn').addEventListener('click', checkGuess);
document.getElementById('new-btn').addEventListener('click', newGame);

// close overlay on backdrop click
document.getElementById('overlay').addEventListener('click', function(e){
  if (e.target === this) newGame();
});

// start
newGame();
</script>
</body>
</html>
